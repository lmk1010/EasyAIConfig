name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Get tag
        id: get-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.get-tag.outputs.tag }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `EasyAIConfig ${tag}`,
              body: [
                `## EasyAIConfig ${tag}`,
                '',
                '### 📦 下载',
                '| 平台 | 文件 |',
                '|------|------|',
                '| macOS (Apple Silicon) | `.dmg` |',
                '| macOS (Intel) | `.dmg` |',
                '| Windows | `.msi` / `.exe` |',
                '| Linux | `.deb` / `.AppImage` |',
                '',
                '### 🍎 macOS 安装说明',
                '下载 `.dmg` 后拖入 Applications，首次打开前运行：',
                '```bash',
                'sudo xattr -rd com.apple.quarantine /Applications/EasyAIConfig.app',
                '```',
                '然后正常双击打开即可。',
                '',
                '### 更新日志',
                '- 自动构建发布',
              ].join('\n'),
              draft: true,
              prerelease: false
            });
            return data.id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          # macOS Intel
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          # Windows
          - platform: windows-latest
            args: ''
            rust_target: ''
          # Linux
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "::error::缺少 GitHub Secret: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi

          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]]; then
            echo "::error::缺少 GitHub Secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            exit 1
          fi

          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$key_file"

          first_line="$(head -n 1 "$key_file" || true)"
          second_line="$(sed -n '2p' "$key_file" || true)"

          if [[ ! "$first_line" =~ ^untrusted\ comment:\ minisign\ secret\ key ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY 格式错误：第一行必须以 'untrusted comment: minisign secret key' 开头。请把整个私钥文件原文保存到 GitHub Secret，不要只复制第二行、不要 base64、不要压成单行。"
            echo "::error::当前第一行预览：$first_line"
            exit 1
          fi

          if [[ -z "$second_line" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY 缺少第二行密钥内容。请确认 Secret 中保存的是完整多行私钥文件。"
            exit 1
          fi

          if ! npm run tauri -- signer sign -f "$key_file" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" package.json >/dev/null 2>&1; then
            echo "::error::Updater 私钥或密码校验失败。请确认 TAURI_SIGNING_PRIVATE_KEY 是完整私钥文件原文，且 TAURI_SIGNING_PRIVATE_KEY_PASSWORD 与生成该私钥时输入的密码一致。"
            exit 1
          fi

          echo "Updater signing key validation passed"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
